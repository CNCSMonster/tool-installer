# Manifest for dotfiles development environment
# Demonstrates: [_network] mirror config, multiple managers, version probes.

# ============================================================
# Network: GitHub mirror fallback for users behind GFW
# ============================================================
[_network]
github_mirrors = [
    "https://mirror.ghproxy.com",
    "https://ghfast.top",
]
timeout = 60
retry = 3

# ============================================================
# Languages (via mise)
# ============================================================

[python]
[python.linux]
manager = "mise"
plugin = "python"

[node]
[node.linux]
manager = "mise"
plugin = "node"

[go]
[go.linux]
manager = "mise"
plugin = "go"

[rust]
[rust.linux]
manager = "rustup"
components = ["clippy", "rustfmt"]
profile = "minimal"
set_default = true

# ============================================================
# Editors
# ============================================================

[neovim]
[neovim.linux]
manager = "github-release"
repo = "neovim/neovim"
asset = "nvim-linux-x86_64.tar.gz"
bin = "nvim-linux-x86_64/bin/nvim"
install_name = "nvim"
[neovim.linux.version_probe]
command = ["{bin}", "--version"]
regex = "^NVIM v(?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)"

[helix]
[helix.linux]
manager = "github-release"
repo = "helix-editor/helix"
asset = "helix-{version}-x86_64-linux.tar.xz"
bin = "hx"
[helix.linux.version_probe]
command = ["{bin}", "--version"]
regex = "^helix (?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)"

[zellij]
[zellij.linux]
manager = "github-release"
repo = "zellij-org/zellij"
asset = "zellij-{arch}-unknown-linux-musl.tar.gz"
bin = "zellij"
[zellij.linux.version_probe]
command = ["{bin}", "--version"]
regex = "^zellij (?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)"

# ============================================================
# CLI tools (via cargo-install with git sources)
# ============================================================

[bat]
[bat.linux]
manager = "cargo-install"
pkg = "bat"
bin = "bat"

[ripgrep]
[ripgrep.linux]
manager = "cargo-install"
pkg = "ripgrep"
bin = "rg"

[fd]
[fd.linux]
manager = "github-release"
repo = "sharkdp/fd"
asset = "fd-{version}-{arch}-unknown-linux-gnu.tar.gz"
bin = "fd-{version}-{arch}-unknown-linux-gnu/fd"
install_name = "fd"
[fd.linux.version_probe]
command = ["{bin}", "--version"]
regex = "^fd (?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)"

[yazi]
[yazi.linux]
manager = "mise"
plugin = "yazi"

# ============================================================
# Rust dev tools
# ============================================================

[sccache]
[sccache.linux]
manager = "cargo-install"
pkg = "sccache"
bin = "sccache"

[taplo]
[taplo.linux]
manager = "cargo-install"
pkg = "taplo-cli"
bin = "taplo"
