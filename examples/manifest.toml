# tool-installer example manifest
# Demonstrates: mise, rustup, script, npm-global, and github-release with version_probe.

[python]
[python.linux]
manager = "mise"
plugin = "python"

[rust]
[rust.linux]
manager = "rustup"
components = ["clippy", "rustfmt"]
targets = ["wasm32-unknown-unknown"]
profile = "minimal"
set_default = true

[example-script]
[example-script.linux]
manager = "script"
path = "scripts/install-example"

[qwen-code]
[qwen-code.linux]
manager = "npm-global"
pkg = "@qwen-code/qwen-code"
bin = "qwen"

[example-release]
[example-release.linux]
manager = "github-release"
repo = "owner/project"
asset = "{tool}-{version}-{os}-{arch}.tar.gz"
bin = "example-release"
install_name = "example-release"
[example-release.linux.version_probe]
command = ["{bin}", "--version"]
regex = "^example-release (?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)"
